<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Student Marks Form</title>
</head>

<body>

  <fieldset>
    <legend><b>Student Report</b></legend>

    <form
      oninput="x.value=(parseInt(m1.value||0)+parseInt(m2.value||0)+parseInt(m3.value||0))/3">

      <label>Student Name</label><br>
      <input type="text" id="name" placeholder="Enter Name"><br><br>

      <label>Class</label><br>
      <input type="text" id="class" placeholder="Enter Class"><br><br>

      <label>Subject 1</label><br>
      <select id="subject1">
        <option>Maths</option>
        <option>English</option>
        <option>Science</option>
      </select>

      <input type="number" id="m1" name="m1" placeholder="Enter Marks"><br><br>

      <label>Subject 2</label><br>
      <select id="subject2">
        <option>Maths</option>
        <option>English</option>
        <option>Science</option>
      </select>

      <input type="number" id="m2" name="m2" placeholder="Enter Marks"><br><br>

      <label>Subject 3</label><br>
      <select id="subject3">
        <option>Maths</option>
        <option>English</option>
        <option>Science</option>
      </select>

      <input type="number" id="m3" name="m3" placeholder="Enter Marks"><br><br>

      <div class="avg">
        Average Marks:
        <output name="x" for="m1 m2 m3"></output>
      </div>

    </form>
  </fieldset>

</body>

</html>
